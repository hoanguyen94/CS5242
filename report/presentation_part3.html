<h1 id="problem-statement--motivation">Problem Statement &amp; Motivation</h1>
<p><strong>Task.</strong> 100-class image classification on <strong>Mini-ImageNet</strong> — small enough to iterate on a single GPU yet rich enough to distinguish modern architectures.</p>
<p><strong>Why this problem?</strong> Canonical CV task where trade-offs between <strong>architecture</strong>, <strong>data regime</strong>, and <strong>pretraining</strong> can be measured cleanly. Mini-ImageNet stresses <strong>small data</strong> (500/class), <strong>low resolution</strong> (32×32), and the <strong>pretrained-vs-scratch</strong> divide.</p>
<p><strong>Why deep learning?</strong> 100-way image classification needs hierarchical visual features — CNN/ConvNeXt inductive biases match the input structure; no competitive classical alternative at this scale.</p>
<p><strong>Why pretrained models — justified.</strong> We use them in <strong>A1 &amp; A2</strong> to quantify how much Mini-ImageNet performance is carried by ImageNet pretraining, and include <strong>A3 (from scratch)</strong> to isolate that contribution. The scientific question is <em>the value of pretraining</em>.</p>
</section>

<h1 id="dataset">Dataset</h1>
<ul>
<li><strong>Source:</strong> Mini-ImageNet [4] — 100 classes drawn from ImageNet-1K</li>
<li><strong>Splits:</strong> 50,000 train / 10,000 val / 5,000 test (fixed, reproducible)</li>
<li><strong>Balance:</strong> 500 train images per class (perfectly balanced — no re-weighting needed)</li>
<li><strong>Resolutions tested:</strong> native (≈500×N) resized to <strong>224×224</strong> and <strong>32×32</strong></li>
</ul>
<div class="columns">
<div>
<h3 id="why-32%C3%9732-and-224%C3%97224">Why 32×32 <em>and</em> 224×224?</h3>
<ul>
<li><strong>224×224</strong> matches pretraining → upper-bound on pretrained feature quality</li>
<li><strong>32×32</strong> stresses architectures <em>off</em> design regime — robustness test + practical memory-bandwidth setting</li>
</ul>
</div>
<div>
<h3 id="known-caveat">Known Caveat</h3>
<p>Mini-ImageNet's 100 classes are a <em>subset</em> of ImageNet-1K. Pretrained backbones have seen these classes, so 224×224 pretrained numbers are an <strong>upper bound</strong>, not transfer to an unseen distribution. Approach 3 (from scratch) addresses this directly.</p>
</div>
</div>

<h1 id="pre-processing-pipeline">Pre-processing Pipeline</h1>
<div class="columns">
<div>
<h3 id="shared-across-all-approaches">Shared across all approaches</h3>
<ul>
<li><strong>Resize</strong> to target (224 or 32) with aspect-preserving centre crop</li>
<li><strong>Normalise</strong> with this dataset's own mean/std (from the train split), not ImageNet defaults</li>
<li><strong>Channel order</strong> RGB, tensor in <code>[0,1]</code> before normalisation</li>
<li>Split integrity: transforms fit on <strong>train only</strong>; val/test use those stats</li>
</ul>
</div>
<div>
<h3 id="approach-specific">Approach-specific</h3>
<ul>
<li><strong>A2 &amp; A3 (training):</strong> random crop + horizontal flip augmentation</li>
<li><strong>A1 (frozen features):</strong> no train-time augmentation — features extracted once and cached</li>
<li><strong>A3 (from scratch):</strong> heavier augmentation may be used — <em>[team member to specify]</em></li>
</ul>
</div>
</div>
<blockquote>
<p>Computing mean/std <em>on this dataset</em> is deliberate: the 32×32 resized distribution's statistics drift from full-resolution ImageNet statistics.</p>
</blockquote>

<h1 id="the-three-lens-design">The Three-Lens Design</h1>
<div class="columns-3">
<div>
<h3 id="approach-1--classical-ml">Approach 1 — Classical ML</h3>
<p><strong>Role:</strong> strong baseline using <strong>pretrained</strong> features</p>
<ul>
<li>Frozen backbone + linear SVM / LogReg</li>
<li>Isolates feature quality from classifier choice</li>
<li>Very cheap, interpretable</li>
</ul>
</div>
<div>
<h3 id="approach-2--fine-tuning">Approach 2 — Fine-Tuning</h3>
<p><strong>Role:</strong> <strong>proposed improvement</strong></p>
<ul>
<li>Pretrained init + selective unfreezing</li>
<li>Combines transfer with task-specific adaptation</li>
<li>Expected Pareto-best at moderate cost</li>
</ul>
</div>
<div>
<h3 id="approach-3--scratch">Approach 3 — Scratch</h3>
<p><strong>Role:</strong> baseline from <strong>first principles</strong></p>
<ul>
<li>Random init, full training</li>
<li>Same architecture family, no ImageNet prior</li>
<li>Measures <em>pure</em> in-domain signal</li>
</ul>
</div>
</div>
<blockquote>
<p><strong>Scientific question:</strong> how much of Mini-ImageNet performance is <em>feature quality from pretraining</em> (A1) vs <em>task-specific adaptation</em> (A2) vs <em>learned end-to-end without prior</em> (A3)?<br />
Reporting all three lets us attribute performance to each source instead of conflating them.</p>
</blockquote>
</section>

<h1 id="approach-1-motivation">Approach 1: Motivation</h1>
<p><strong>Idea:</strong> Use pretrained ImageNet backbones as <strong>frozen feature extractors</strong>, then train lightweight classical classifiers on the extracted features.</p>
<div class="columns">
<div>
<h3 id="advantages">Advantages</h3>
<ul>
<li><strong>Data efficient</strong> — only classifier head is learnable</li>
<li><strong>Fast</strong> — single forward pass + seconds-to-minutes training</li>
<li><strong>Interpretable</strong> — isolates backbone effect</li>
</ul>
</div>
<div>
<h3 id="limitations">Limitations</h3>
<ul>
<li>No task-specific feature adaptation</li>
<li>Resolution sensitivity (pretrained for 224×224)</li>
<li>Linear classifier ceiling</li>
</ul>
</div>
</div>
</section>

<h1 id="approach-1-pipeline">Approach 1: Pipeline</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Image → [Pretrained Backbone (frozen)] → Global Avg Pool → Feature Vector → [SVM / LogReg] → Class
</code></pre>
<p><strong>Pipeline:</strong></p>
<ol>
<li>Load pretrained ImageNet backbone — freeze all weights</li>
<li>Extract feature vectors via forward pass (one-time cost)</li>
<li>Train classical classifier on extracted features</li>
</ol>
<p><strong>Classifiers (sklearn, default hyperparameters):</strong></p>
<ul>
<li><strong>Linear SVM</strong> — <code>LinearSVC</code>, <strong>squared-hinge</strong> loss + L2, OvR, liblinear coordinate-descent solver</li>
<li><strong>Logistic Regression</strong> — multinomial cross-entropy + L2, LBFGS, <code>max_iter=2000</code></li>
</ul>
<blockquote>
<p>Results are single-seed with default hyperparameters.</p>
</blockquote>

<h1 id="why-convnext-tiny-dominates-at-32%C3%9732">Why ConvNeXt-Tiny Dominates at 32×32</h1>
<p>The key lies in how each architecture's <strong>stem</strong> processes low-resolution input:</p>
<div class="columns">
<div>
<h3 id="convnext-tiny-stem">ConvNeXt-Tiny Stem</h3>
<ul>
<li><strong>4×4 stride-4 patchify</strong> convolution</li>
<li>32×32 input → <strong>8×8 feature map</strong> after stem</li>
<li>Subsequent <strong>7×7 depthwise kernels</strong> still have meaningful spatial extent to work with</li>
<li>LayerNorm stabilises activations; GELU preserves gradient flow</li>
</ul>
</div>
<div>
<h3 id="resnet-stem">ResNet Stem</h3>
<ul>
<li><strong>7×7 stride-2</strong> conv + <strong>3×3 stride-2</strong> max-pool</li>
<li>32×32 input → <strong>8×8</strong> after stem, then quickly <strong>1×1</strong> through residual stages</li>
<li>Deeper layers receive <strong>spatially degenerate</strong> feature maps — no local structure to exploit</li>
<li>BatchNorm statistics are calibrated for 224×224 distributions</li>
</ul>
</div>
</div>
<blockquote>
<p>ConvNeXt's patchify stem is resolution-adaptive: it reduces spatial dims in one step without the cascading downsampling that collapses small inputs in ResNets.</p>
</blockquote>
</section>

<h1 id="why-architecture-matters-more-than-depth">Why Architecture Matters More Than Depth</h1>
<p><img src="analysis_efficiency_tradeoff.png" alt="" style="width:850px;" /></p>
<ul>
<li><strong>ResNet-18/34/50 cluster within ~1% on LogReg</strong> (32.46 / 33.16 / 33.22) → extra depth gives no headroom at 32×32</li>
<li><strong>ConvNeXt-Tiny</strong> leads by 10+% — patchify stem + 7×7 DW-Conv preserve spatial structure</li>
<li><strong>EfficientNet-b0 underperforms</strong> — designed for 224×224; at 32×32 its feature maps are too small for Squeeze-and-Excitation (SE) attention and depthwise convolutions to be effective</li>
<li><em>Caveat:</em> RN-50 uses torchvision <code>V2</code> weights; the &quot;depth doesn't help&quot; claim holds for LogReg but SVM+RN-50 is an outlier</li>
</ul>
</section>

<li>Modern architecture innovations</li>
<li>Best candidate for further improvement</li>
</ul>
</div>
<div>
<h3 id="2-resnet-18-classical-baseline">2. ResNet-18 (Classical Baseline)</h3>
<ul>
<li><strong>Fastest inference</strong> (2.9 ms/image)</li>
<li>Well-established architecture</li>
<li>Measures how much fine-tuning closes the gap</li>
<li>Simple &amp; interpretable</li>
</ul>
</div>

<blockquote>

<h1 id="approach-1--key-takeaways">Approach 1 — Key Takeaways</h1>
<ol>
<li><strong>ConvNeXt-Tiny is the strongest backbone</strong> — leads by 10+% at both resolutions on Mini-ImageNet</li>
<li><strong>Architecture matters more than depth</strong> — RN-18/34/50 cluster within ~1%; ConvNeXt's stem design is the larger effect</li>
<li><strong>Resolution is the dominant factor</strong> — 224→32 costs ≈50% for both probed backbones; larger than any architecture gap</li>
<li><strong>EfficientNet-b0 underperforms at 32×32</strong> — designed for 224×224; feature maps too small for SE attention and depthwise convolutions</li>
<li><strong>Small val–test gap (0.6–3.0%)</strong> — linear probes on frozen features generalise well</li>
<li><strong>Limitations.</strong> Single seed, default hyperparameters, Mini-ImageNet ⊂ ImageNet-1K, mixed <code>V1</code>/<code>V2</code> torchvision weights</li>
</ol>
</section>

<h1 id="approach-2-motivation--setup">Approach 2: Motivation &amp; Setup</h1>
<p><strong>Idea:</strong> Start from ImageNet-pretrained ConvNeXt-Tiny and ResNet-18, then adapt the classifier, the deepest stage, the full model, or low-rank adapter paths to Mini-ImageNet.</p>
<div class="columns">
<div>
<h3 id="why-this-improves-approach-1">Why this improves Approach 1</h3>
<ul>
<li>Approach 1 freezes the representation and only learns a linear boundary</li>
<li>Fine-tuning lets high-level features reorganise around Mini-ImageNet's 100 classes</li>
<li>Tests whether ConvNeXt's frozen-feature advantage survives task adaptation</li>
</ul>
</div>
<div>
<h3 id="shared-protocol">Shared protocol</h3>
<ul>
<li><strong>Input:</strong> 32×32 Mini-ImageNet</li>
<li><strong>Backbones:</strong> ConvNeXt-Tiny, ResNet-18</li>
<li><strong>Runs:</strong> <code>USE_AUG=False</code>, <code>mix_mode=none</code></li>
<li><strong>Optimiser:</strong> AdamW [8], LR = <code>1e-4</code></li>
<li><strong>Schedule:</strong> cosine annealing [9] + early stopping</li>
</ul>
</div>
</div>
<blockquote>
<p>Fine-tuning asks: how much can we recover from the 32×32 resolution floor once the backbone is allowed to adapt?</p>
</blockquote>
</section>

<h1 id="approach-2-four-adaptation-policies">Approach 2: Four Adaptation Policies</h1>
<table>
<thead>
<tr>
<th>Policy</th>
<th>What is trainable?</th>
<th style="text-align:right">Patience</th>
<th style="text-align:right">ConvNeXt trainable</th>
<th style="text-align:right">ResNet trainable</th>
</tr>
</thead>
<tbody>
<tr>
<td>Classifier only (<code>backbone</code>)</td>
<td>final classifier head only</td>
<td style="text-align:right">3</td>
<td style="text-align:right">0.078M</td>
<td style="text-align:right">0.051M</td>
</tr>
<tr>
<td>Last stage + classifier</td>
<td>deepest feature stage + classifier</td>
<td style="text-align:right">7</td>
<td style="text-align:right">15.549M</td>
<td style="text-align:right">8.445M</td>
</tr>
<tr>
<td>Full fine-tuning (<code>none</code>)</td>
<td>all pretrained weights + classifier</td>
<td style="text-align:right">7</td>
<td style="text-align:right">27.897M</td>
<td style="text-align:right">11.228M</td>
</tr>
<tr>
<td>LoRA [10]</td>
<td>Linear-layer adapters + classifier; base weights frozen</td>
<td style="text-align:right">5</td>
<td style="text-align:right">0.608M</td>
<td style="text-align:right">0.056M</td>
</tr>
</tbody>
</table>
<h3 id="why-these-policies">Why these policies?</h3>
<ul>
<li><strong>Classifier only</strong> is the transfer-learning analogue of the Approach 1 frozen-feature baseline, but with a neural head</li>
<li><strong>Last stage</strong> targets class-specific semantic features while preserving generic early filters</li>
<li><strong>Full fine-tuning</strong> gives maximum adaptation capacity</li>
<li><strong>LoRA</strong> tests parameter-efficient adaptation on eligible <code>Linear</code> layers only, with rank = 8 and alpha = 16</li>
</ul>
<blockquote>
<p>These policies move from cheapest and most constrained to most flexible, letting us separate classifier learning from representation adaptation.</p>
</blockquote>

<h1 id="lora-low-rank-adaptation">LoRA: Low-Rank Adaptation</h1>
<p>LoRA is applied only to eligible backbone <code>Linear</code> layers in our implementation; convolutional layers are not LoRA-adapted.</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msup><mi>W</mi><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msup><mo>=</mo><msub><mi>W</mi><mrow><mi>f</mi><mi>r</mi><mi>o</mi><mi>z</mi><mi>e</mi><mi>n</mi></mrow></msub><mo>+</mo><mi>B</mi><mi>A</mi><mfrac><mi>α</mi><mi>r</mi></mfrac></mrow><annotation encoding="application/x-tex">W&#x27; = W_{frozen} + B A \frac{\alpha}{r}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8019em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.13889em;">W</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.8019em;"><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.9694em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.13889em;">W</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.1389em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.10764em;">f</span><span class="mord mathnormal mtight" style="margin-right:0.02778em;">r</span><span class="mord mathnormal mtight" style="margin-right:0.04398em;">oz</span><span class="mord mathnormal mtight">e</span><span class="mord mathnormal mtight">n</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1.7936em;vertical-align:-0.686e <div>
<h3 id="what-is-trained">What is trained?</h3>
<ul>
<li>LoRA matrices <code>A</code> and <code>B</code> in targeted <code>Linear</code> layers</li>
<li>Final classifier head</li>
<li>Original backbone weights remain frozen</li>
<li>Rank <code>r = 8</code>, scaling <code>alpha = 16</code></li>
</ul>
</div>
<div>
<h3 id="why-it-matters-here">Why it matters here</h3>
<ul>
<li>ConvNeXt has many internal <code>Linear</code> layers, so LoRA can adapt useful representation paths</li>
<li>ResNet-18 is mostly convolutional, so Linear-layer LoRA has less room to help</li>
<li>Explains the architecture-specific LoRA result: <strong>61.74%</strong> for ConvNeXt vs <strong>19.64%</strong> for ResNet-18</li>
</ul>
</div>
</div>
<blockquote>
<p>LoRA is parameter-efficient, but its benefit depends on whether the backbone exposes useful <code>Linear</code> layers for low-rank updates.</p>

<div>
<h3 id="why-adamw">Why AdamW?</h3>
<ul>
<li>Adaptive step size for each parameter</li>
<li>Weight decay is applied separately from gradient moments</li>
<li>Stable for fine-tuning pretrained ConvNeXt and ResNet at LR = <code>1e-4</code></li>
</ul>
</div>
<div>
<h3 id="parameters">Parameters</h3>
<ul>
<li><code>g_t</code>: gradient at step <code>t</code></li>
<li><code>m_t</code>: moving average of gradients; <code>beta_1</code> controls momentum</li>
<li><code>v_t</code>: moving average of squared gradients; <code>beta_2</code> controls gradient scale memory</li>
<li><code>eta</code>: learning rate, <code>lambda</code>: weight decay, <code>epsilon</code>: stability constant</li>
</ul>
</div>
</div>
<blockquote>
<p>Compared with SGD, AdamW is less sensitive to one global learning rate and handles layers with different gradient scales better.</p>
</blockquote>
</section>

<h1 id="cosine-annealing-scheduler">Cosine Annealing Scheduler</h1>
<p>All fine-tuning runs use AdamW with a cosine learning-rate schedule:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>η</mi><mi>t</mi></msub><mo>=</mo><msub><mi>η</mi><mrow><mi>m</mi><mi>i</mi><mi>n</mi></mrow></msub><mo>+</mo><mfrac><mn>1</mn><mn>2</mn></mfrac><mo stretchy="false">(</mo><msub><mi>η</mi><mrow><mi>m</mi><mi>a</mi><mi>x</mi></mrow></msub><mo>−</mo><msub><mi>η</mi><mrow><mi>m</mi><mi>i</mi><mi>n</mi></mrow></msub><mo stretchy="false">)</mo><mrow><mo fence="true">(</mo><mn>1</mn><mo>+</mo><mi>cos</mi><mo>⁡</mo><mrow><mo fence="true">(</mo><mfrac><mi>t</mi><msub><mi>T</mi><mrow><mi>m</mi><mi>a</mi><mi>x</mi></mrow></msub></mfrac><mi>π</mi><mo fence="true">)</mo></mrow><mo fence="true">)</mo></mrow></mrow><annotation encoding="application/x-tex">\eta_t = \eta_{min} + \frac{1}{2}(\eta_{max} - \eta_{min})\left(1 + \cos\left(\frac{t}{T_{max}}\pi\right)\right)
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.625em;vertical-align:-0.1944em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">η</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.2806em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">t</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7778em;vertical-align:-0.1944em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">η</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">min</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:2.0074em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2">< ><span class="mord mtight"><span class="mord mathnormal mtight">min</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose">)</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="minner"><span class="mopen delimcenter" style="top:0em;"><span class="delimsizing size3">(</span></span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mop">cos</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="minner"><span class="mopen delimcenter" style="top:0em;"><span class="delimsizing size3">(</span></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.2921em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord"><span class="mord mathnormal" style="margin-right:0.13889em;">T</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:-0.1389em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">ma</span><span class="mord mathnormal mtight">x</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord mathnormal">t</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.836em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mord mathnormal" style="margin-right:0.03588em;">π</span><span class="mclose delimcenter" style="top:0em;"><span class="delimsizing size3">)</span></span></span><span class="mclose delimcenter" style="top:0em;"><span class="delimsizing size3">)</span></span></span></span></span></span></span></p><div class="columns">
<div>
<h3 id="why-use-it">Why use it?</h3>
<ul>
<li>Larger updates early help the model move toward Mini-ImageNet-specific features</li>
<li>Smaller updates later avoid disrupting useful pretrained representations</li>
<li>Smooth decay is better suited to fine-tuning than abrupt LR drops</li>
</ul>
</div>
<div>
<h3 id="in-our-setup">In our setup</h3>
<ul>
<li>Initial LR: <code>1e-4</code></li>
<li>Schedule length: full epoch budget</li>
<li>Checkpoint selection: best validation accuracy</li>
<li>Early stopping prevents wasting epochs after validation saturation</li>
</ul>
</div>
</div>
<blockquote>
<p>Cosine annealing gives adaptation room early, then stabilises the pretrained backbone as training converges.</p>
</blockquote>
</section>

<h1 id="approach-2--what-the-results-say">Approach 2 — What the Results Say</h1>
<div class="columns">
<div>
<h3 id="convnext-tiny">ConvNeXt-Tiny</h3>
<ul>
<li>Classifier only already improves over the Approach 1 frozen LogReg baseline: <strong>50.92% vs 44.16%</strong></li>
<li>Last-stage fine-tuning adds another <strong>+4.52%</strong></li>
<li>Full fine-tuning reaches <strong>62.70%</strong>, the strongest result</li>
<li>LoRA reaches <strong>61.74%</strong>, only <strong>0.96%</strong> behind full tuning</li>
</ul>
</div>
<div>
<h3 id="resnet-18">ResNet-18</h3>
<ul>
<li>Classifier-only transfer is weak: <strong>19.98%</strong>, below the Approach 1 frozen-feature probes</li>
<li>Last-stage tuning recovers to <strong>32.64%</strong></li>
<li>Full fine-tuning reaches <strong>39.34%</strong>, best ResNet result</li>
<li>LoRA stays near classifier-only because adapters only target <code>Linear</code> layers</li>
</ul>
</div>
</div>
<blockquote>
<p>ConvNeXt-Tiny benefits from both full fine-tuning and LoRA because its ConvNeXt blocks contain many internal Linear layers; ResNet-18 needs broader convolutional adaptation.</p>
</blockquote>
</section>

<h1 id="motivation--evaluation-setting">Motivation &amp; Evaluation Setting</h1>
<p><strong>Why train from scratch?</strong></p>
<ul>
<li>Transfer learning can mask intrinsic architectural properties</li>
<li>Realistic scenario for:
<ul>
<li>Domain-specific datasets</li>
<li>Limited compute / no large-scale pretraining</li>
<li>Resource-constrained deployment</li>
</ul>
</li>
</ul>
<p><strong>Goal:</strong><br />
Isolate the <strong>pure efficiency–effectiveness trade-off</strong> of architectures <em>without ImageNet priors</em>.</p>
<blockquote>
<p>Training from scratch is a <strong>stress test</strong> for architectural inductive bias, optimization stability, and parameter efficiency.</p>
</blockquote>

<h1 id="key-insights--implications">Key Insights &amp; Implications</h1>
<h3 id="what-we-learn">What we learn</h3>
<ol>
<li><strong>Larger ≠ better</strong> without pretraining<br />
ConvNeXt-Tiny underperforms despite highest capacity</li>
<li><strong>Inductive bias &gt; parameter count</strong><br />
Lightweight ConvNeXt-style design generalizes better</li>
<li><strong>Multi-scale features help</strong><br />
Inception-style depthwise kernels recover lost capacity</li>
<li><strong>Optimization robustness matters</strong><br />
Proposed models are stable across schedulers and learning rates</li>
</ol>
<blockquote>
<p><strong>Conclusion:</strong><br />
A carefully designed lightweight architecture can achieve a <strong>superior efficiency–effectiveness trade-off</strong> compared to both classical ResNets and large modern ConvNets when trained entirely from scratch.</p>
</blockquote>

<h1 id="efficiency-netscore--interpretation">Efficiency, NetScore &amp; Interpretation</h1>
<h3 id="netscore-reshapes-the-ranking">NetScore reshapes the ranking</h3>
<ul>
<li><strong>Approach 3 achieves the highest NetScore</strong>
<ul>
<li>ConvNeXt‑Lite: <strong>50.12</strong> with only <strong>3.56M params</strong></li>
<li>Fast inference (<strong>2.98 ms/img</strong>) offsets lower absolute accuracy</li>
</ul>
</li>
<li><strong>Approach 2</strong> improves accuracy but pays for it with:
<ul>
<li>Larger backbones (27.9M params)</li>
<li>Higher latency (~6 ms/img)<br />
→ NetScore gains are <strong>moderate</strong>, not dominant</li>
</ul>
</li>
<li><strong>Approach 1</strong> is efficient and stable but capped by frozen representations</li>
</ul>
<h3 id="key-interpretation">Key interpretation</h3>
<ul>
<li><strong>Higher accuracy ≠ better overall performance</strong></li>
<li>Optimal strategy depends on deployment constraints:
<ul>
<li>Accuracy‑first → <strong>Transfer learning</strong></li>
<li>Simplicity &amp; stability → <strong>Frozen features</strong></li>
<li>Balanced efficiency–effectiveness → <strong>Lightweight from‑scratch design</strong></li>
</ul>
</li>
</ul>
<blockquote>
<p><strong>Takeaway:</strong><br />
There is no universally optimal approach.<br />
<strong>Architectural design aligned with constraints matters more than raw accuracy alone.</strong></p>
</blockquote>
<p>--</p>
